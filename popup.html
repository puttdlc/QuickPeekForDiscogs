<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 300px;
        background: #1a1a1a;
        color: #f0f0f0;
        font-family: Arial, sans-serif;
      }

      @keyframes popIn {
        0%  { opacity: 0; transform: scale(0.9); }
        70% { transform: scale(1.02); }
        100%{ opacity: 1; transform: scale(1); }
      }

      /* Shared entrance animation for whichever screen (main or advanced)
         is currently displayed — replays each time display toggles to block */
      .screen {
        animation: popIn 0.27s ease-out;
      }

      .header {
        background: #242424;
        border-bottom: 1px solid #333;
        padding: 16px;
        animation: slideDown 0.27s ease-out;
      }

      @keyframes slideDown {
        from { opacity: 0; transform: translateY(-20px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .app-title {
        font-size: 15px;
        font-weight: bold;
      }

      .app-subtitle {
        font-size: 12px;
        color: #888;
        margin-top: 2px;
      }

      .content {
        padding: 20px 16px;
      }

      .label {
        font-size: 12px;
        color: #888;
        margin-bottom: 8px;
        animation: fadeUp 0.27s ease-out 0.07s both;
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .input-wrapper {
        position: relative;
        animation: fadeUp 0.27s ease-out 0.13s both;
      }

      .token-input {
        width: 100%;
        padding: 10px;
        padding-left: 32px;
        padding-right: 36px;
        background: #2e2e2e;
        border: 1px solid #444;
        border-radius: 8px;
        color: #f0f0f0;
        font-size: 13px;
        font-family: Arial, sans-serif;
        outline: none;
        transition: border-color 0.2s;
      }

      .token-input::placeholder {
        color: #666;
      }

      .token-input:focus {
        border-color: #f3a125;
        box-shadow: 0 0 0 3px rgba(243, 161, 37, 0.2);
      }

      .lock-icon {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        width: 14px;
        height: 14px;
        color: #888;
        pointer-events: none;
      }

      .lock-icon svg,
      .toggle-btn svg {
        display: block;
        width: 14px;
        height: 14px;
        stroke: currentColor;
      }

      .input-wrapper::after {
        content: "";
        position: absolute;
        right: 28px;
        top: 2px;
        bottom: 2px;
        width: 32px;
        background: linear-gradient(to right, transparent, #2e2e2e);
        pointer-events: none;
      }

      .toggle-btn {
        position: absolute;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        color: #888;
        padding: 4px;
        display: flex;
      }

      .toggle-btn:hover {
        color: #f3a125;
      }

      .divider {
        height: 1px;
        background: #333;
        margin: 16px 0;
        animation: fadeUp 0.27s ease-out 0.2s both;
      }

      #saveBtn {
        width: 100%;
        padding: 10px;
        background: #f3a125;
        color: #1a1a1a;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: bold;
        font-family: Arial, sans-serif;
        cursor: pointer;
        transition: background 0.2s;
        animation: bounceIn 0.33s ease-out 0.23s both;
      }

      @keyframes bounceIn {
        0%   { opacity: 0; transform: scale(0.8); }
        60%  { transform: scale(1.05); }
        100% { opacity: 1; transform: scale(1); }
      }

      #saveBtn:hover {
        background: #ffb84d;
      }

      #saveBtn:active {
        transform: scale(0.97);
      }

      #status {
        font-size: 12px;
        margin-top: 10px;
        text-align: center;
      }

      #status.success {
        color: #4caf6e;
        animation: bounceIn 0.3s ease-out;
      }

      #status.error {
        color: #e05a5a;
        animation: shake 0.4s ease-out;
      }

      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25%       { transform: translateX(-5px); }
        75%       { transform: translateX(5px); }
      }

      .footer {
        padding: 12px 16px;
        border-top: 1px solid #333;
        display: flex;
        justify-content: center;
        gap: 8px;
        animation: fadeUp 0.27s ease-out 0.27s both;
      }

      .footer a {
        font-size: 11px;
        color: #888;
        text-decoration: none;
      }

      .footer a:hover {
        color: #f3a125;
      }

      .disclaimer {
        text-align: center;
        font-size: 10px;
        color: #555;
        padding: 0 16px 10px;
        animation: fadeUp 0.27s ease-out 0.33s both;
      }

      .setting-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 4px 0 12px;
        animation: fadeUp 0.27s ease-out 0.2s both;
      }

      .setting-label {
        font-size: 13px;
        font-weight: bold;
      }

      .setting-desc {
        font-size: 11px;
        color: #666;
        margin-top: 2px;
      }

      .switch {
        position: relative;
        width: 36px;
        height: 20px;
        flex-shrink: 0;
      }

      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .slider {
        position: absolute;
        cursor: pointer;
        inset: 0;
        background: #444;
        border-radius: 20px;
        transition: background 0.2s;
      }

      .slider::before {
        content: "";
        position: absolute;
        width: 14px;
        height: 14px;
        left: 3px;
        top: 3px;
        background: white;
        border-radius: 50%;
        transition: transform 0.2s;
      }

      .switch input:checked + .slider {
        background: #f3a125;
      }

      .switch input:checked + .slider::before {
        transform: translateX(16px);
      }

      .secondary-btn {
        width: 100%;
        padding: 10px;
        background: #2e2e2e;
        color: #f0f0f0;
        border: 1px solid #444;
        border-radius: 8px;
        font-size: 13px;
        font-weight: bold;
        font-family: Arial, sans-serif;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: border-color 0.2s, color 0.2s;
        animation: fadeUp 0.27s ease-out 0.22s both;
      }

      .secondary-btn:hover {
        border-color: #f3a125;
        color: #f3a125;
      }

      .secondary-btn svg {
        display: block;
        width: 14px;
        height: 14px;
        stroke: currentColor;
      }

      .back-btn {
        background: none;
        border: none;
        color: #888;
        font-size: 12px;
        font-family: Arial, sans-serif;
        cursor: pointer;
        padding: 0;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .back-btn:hover {
        color: #f3a125;
      }

      .weight-row {
        padding: 12px 0;
        border-bottom: 1px solid #2a2a2a;
        animation: fadeUp 0.27s ease-out both;
      }

      .weight-row:last-child {
        border-bottom: none;
      }

      .weight-row-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 8px;
      }

      .weight-label {
        font-size: 13px;
        font-weight: bold;
      }

      .weight-desc {
        font-size: 11px;
        color: #666;
        margin-top: 2px;
      }

      .weight-controls {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-shrink: 0;
      }

      .weight-number {
        width: 52px;
        padding: 5px 6px;
        background: #2e2e2e;
        border: 1px solid #444;
        border-radius: 6px;
        color: #f0f0f0;
        font-size: 12px;
        font-family: Arial, sans-serif;
        text-align: center;
        outline: none;
      }

      .weight-number:focus {
        border-color: #f3a125;
      }

      .rewind-btn {
        background: none;
        border: none;
        color: #888;
        cursor: pointer;
        padding: 4px;
        display: flex;
      }

      .rewind-btn:hover {
        color: #f3a125;
      }

      .rewind-btn svg {
        display: block;
        width: 14px;
        height: 14px;
        stroke: currentColor;
      }

      .weight-slider {
        width: 100%;
        accent-color: #f3a125;
      }

      #advancedScreen {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="mainScreen" class="screen">
      <div class="header">
        <div class="app-title">Quick Peek for Discogs</div>
        <div class="app-subtitle">Settings</div>
      </div>

      <div class="content">
        <div class="label">Personal Access Token</div>

        <div class="input-wrapper">
          <input type="password" id="tokenInput" class="token-input" placeholder="Paste your token here..." />
          <span class="lock-icon" id="lockIcon"></span>
          <button class="toggle-btn" id="toggleVisibility" title="Show/hide token">
            <span id="eyeIcon"></span>
          </button>
        </div>

        <div class="divider"></div>

        <div class="setting-row">
          <div>
            <div class="setting-label">Instant Select Lookup</div>
            <div class="setting-desc">Auto-query any highlighted text</div>
          </div>
          <label class="switch">
            <input type="checkbox" id="instantToggle" />
            <span class="slider"></span>
          </label>
        </div>

        <div class="divider"></div>

        <button id="advancedBtn" class="secondary-btn">
          Advanced Settings
          <span id="slidersIcon"></span>
        </button>

        <div class="divider" style="animation-delay: 0.24s"></div>

        <button id="saveBtn">Save Token</button>
        <div id="status"></div>
      </div>

      <div class="footer">
        <a href="https://www.discogs.com/settings/developers" target="_blank">Get API Token</a>
        <span style="color: #555">·</span>
        <a href="https://www.discogs.com" target="_blank">Discogs</a>
      </div>

      <div class="disclaimer">Not officially affiliated with Discogs</div>
    </div>

    <div id="advancedScreen" class="screen">
      <div class="header">
        <button id="backBtn" class="back-btn">&larr; Back</button>
        <div class="app-title">Advanced Settings</div>
        <div class="app-subtitle">Tune result-scoring weights</div>
      </div>

      <div class="content" id="weightsList"></div>
    </div>

    <script src="weights.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
